<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela Güsak</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f5;
      color: #1a1a1a;
      padding: 32px 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #37003c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: #00ff85;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #37003c;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    /* ── Contenedor principal ── */
    .tabla-contenedor {
      display: flex;
      align-items: flex-start;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* ── Tabla FIJA (izquierda) ── */
    .tabla-fija {
      flex-shrink: 0;
      /* Sombra derecha para indicar scroll */
      box-shadow: 3px 0 8px rgba(0,0,0,0.10);
      position: relative;
      z-index: 1;
    }

    /* ── Tabla SCROLL (derecha) ── */
    .tabla-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-width: 0;
    }

    /* ── Tablas en común ── */
    table {
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #37003c;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    td {
      padding: 11px 14px;
      text-align: center;
      white-space: nowrap;
      color: #1a1a1a;
    }

    /* ── Columnas de la tabla fija ── */
    td.col-bar {
      padding: 0;
      width: 4px;
    }

    td.col-pos {
      font-weight: 700;
      font-size: 13px;
      color: #888;
      width: 32px;
    }

    td.col-name {
      text-align: left;
      font-weight: 600;
      font-size: 14px;
      padding-left: 0;
    }

    td.col-pts {
      font-weight: 700;
      font-size: 15px;
      width: 52px;
      border-right: none; /* el box-shadow del contenedor hace de separador */
    }

    th.col-pts-h {
      background: #4a0057;
    }

    /* ── Columnas de jornadas ── */
    td.col-j {
      font-size: 13px;
      color: #444;
      min-width: 42px;
    }

    td.np {
      color: #bbb;
      font-style: italic;
    }

    /* ── Avatar ── */
    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    /* ── Barra lateral de color ── */
    tr.top-1 td.col-bar,
    tr.top-2 td.col-bar,
    tr.top-3 td.col-bar,
    tr.top-4 td.col-bar { background: #00cc44; }

    tr.bottom-1 td.col-bar,
    tr.bottom-2 td.col-bar,
    tr.bottom-3 td.col-bar,
    tr.bottom-4 td.col-bar { background: #e63312; }

    /* ── Color de puntos top/bottom ── */
    tr.top-1 td.col-pts,
    tr.top-2 td.col-pts,
    tr.top-3 td.col-pts,
    tr.top-4 td.col-pts { color: #1a7a1a; }

    tr.bottom-1 td.col-pts,
    tr.bottom-2 td.col-pts,
    tr.bottom-3 td.col-pts,
    tr.bottom-4 td.col-pts { color: #cc2200; }

    /* ── Separador entre top y mid ── */
    tr.separator td {
      border-top: 2px dashed #e0e0e0;
    }

    /* ── Sincronizar altura de filas entre las dos tablas ── */
    /* Se hace desde JS después de renderizar */

    @media (max-width: 600px) {
      body { padding: 16px 10px; }
      table { font-size: 12px; }
      td, thead th { padding: 9px 7px; }
      header h1 { font-size: 18px; }
      .avatar { width: 26px; height: 26px; font-size: 9px; }
      td.col-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/>
      </svg>
    </div>
    <div>
      <h1>Quiniela Güsak</h1>
      <p id="subtitulo">Cargando clasificación…</p>
    </div>
  </header>

  <div class="tabla-contenedor">
    <div class="tabla-fija">
      <table>
        <thead id="cabecera-fija"></thead>
        <tbody id="datos-fija"></tbody>
      </table>
    </div>
    <div class="tabla-scroll">
      <table>
        <thead id="cabecera-scroll"></thead>
        <tbody id="datos-scroll"></tbody>
      </table>
    </div>
  </div>

  <script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-IvFFGYOHR_OxkUBqUIReu9vSb3CJq5B31jH2vGU1zAQ68BqB1FIJRCPXpWMML41GLbxPxoPzKekP/pub?gid=1550608994&single=true&output=csv";

    const AVATAR_COLORS = [
      '#37003c','#00529f','#c8102e','#6c1d45','#1b458f',
      '#DA291C','#003090','#EF0107','#0057B8','#241F20',
      '#034694','#132257','#7A263A','#FDB913'
    ];

    function initials(name) {
      return name.trim().substring(0, 2).toUpperCase();
    }

    // Construye el HTML del avatar: imagen si existe, fallback a iniciales
    function avatarHTML(nombre, color) {
      const src = `avatars/${nombre.trim().toLowerCase()}.jpg`;
      return `<img
        class="avatar"
        src="${src}"
        alt="${nombre}"
        onerror="this.outerHTML='<div class=\\'avatar\\' style=\\'background:${color}\\'>${initials(nombre)}</div>'"
      />`;
    }

    fetch(urlCSV)
      .then(r => r.text())
      .then(data => {
        const rows = data.trim().split("\n");
        const headers = rows[0].split(",");
        const bodyRows = rows.slice(1);

        const jugadores = bodyRows.map(fila => {
          const celdas = fila.split(",");
          return {
            nombre: celdas[0].trim(),
            puntos: parseInt(celdas[1]) || 0,
            jornadas: celdas.slice(2).map(v => v.trim())
          };
        });

        jugadores.sort((a, b) => b.puntos - a.puntos);

        const jornHeaders = headers.slice(2);
        const n = jugadores.length;

        document.getElementById('subtitulo').textContent =
          `${n} jugadores · Jornada actual: ${jornHeaders[jornHeaders.length - 1] || '—'}`;

        // Cabeceras
        document.getElementById('cabecera-fija').innerHTML = `
          <tr>
            <th style="width:4px;padding:0;"></th>
            <th style="width:32px;">#</th>
            <th style="text-align:left;">Jugador</th>
            <th class="col-pts-h">Pts</th>
          </tr>`;

        document.getElementById('cabecera-scroll').innerHTML =
          `<tr>${jornHeaders.map(h => `<th>${h}</th>`).join('')}</tr>`;

        const tbodyFija   = document.getElementById('datos-fija');
        const tbodyScroll = document.getElementById('datos-scroll');

        jugadores.forEach((j, i) => {
          const pos = i + 1;
          let clase = 'mid';
          if (i < 4) clase = `top-${i + 1}`;
          else if (i >= n - 4) clase = `bottom-${n - i}`;

          const sepClass = i === 4 ? ' separator' : '';
          const color = AVATAR_COLORS[i % AVATAR_COLORS.length];

          const jornadasHTML = j.jornadas.map(v => {
            const isNP = v.toUpperCase() === 'NP' || v === '' || v === '-';
            return `<td class="col-j${isNP ? ' np' : ''}">${v || '—'}</td>`;
          }).join('');

          tbodyFija.innerHTML += `
            <tr class="${clase}${sepClass}">
              <td class="col-bar"></td>
              <td class="col-pos">${pos}</td>
              <td class="col-name">
                <div class="player-cell">
                  ${avatarHTML(j.nombre, color)}
                  <span>${j.nombre}</span>
                </div>
              </td>
              <td class="col-pts">${j.puntos}</td>
            </tr>`;

          tbodyScroll.innerHTML += `
            <tr class="${clase}${sepClass}">
              ${jornadasHTML}
            </tr>`;
        });

        // Sincronizar alturas de filas entre las dos tablas
        syncRowHeights();
      })
      .catch(() => {
        document.getElementById('subtitulo').textContent = 'Error al cargar los datos.';
      });

    function syncRowHeights() {
      // Cabeceras
      const thFija   = document.querySelectorAll('#cabecera-fija tr');
      const thScroll = document.querySelectorAll('#cabecera-scroll tr');
      thFija.forEach((row, i) => {
        if (thScroll[i]) {
          const h = Math.max(row.offsetHeight, thScroll[i].offsetHeight);
          row.style.height = h + 'px';
          thScroll[i].style.height = h + 'px';
        }
      });

      // Filas de datos
      const trFija   = document.querySelectorAll('#datos-fija tr');
      const trScroll = document.querySelectorAll('#datos-scroll tr');
      trFija.forEach((row, i) => {
        if (trScroll[i]) {
          const h = Math.max(row.offsetHeight, trScroll[i].offsetHeight);
          row.style.height = h + 'px';
          trScroll[i].style.height = h + 'px';
        }
      });
    }
  </script>
</body>
</html>
