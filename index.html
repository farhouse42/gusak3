<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiniela Güsak</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f5;
      color: #1a1a1a;
      padding: 32px 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #37003c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 28px;
      height: 28px;
      fill: #00ff85;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #37003c;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .table-wrapper {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .scroll-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      border-collapse: collapse;
      font-size: 14px;
      /* No width:100% — dejar que el scroll funcione */
    }

    thead th {
      background: #37003c;
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th.col-left {
      text-align: left;
    }

    /* Columnas fijas (barra, #, jugador, pts) */
    th.sticky, td.sticky {
      position: sticky;
      z-index: 1;
      background: #fff;
    }

    thead th.sticky {
      background: #37003c;
      z-index: 3;
    }

    td.col-bar.sticky { left: 0; width: 4px; padding: 0; }
    th.th-bar { left: 0; width: 4px; padding: 0 !important; }
    td.col-pos.sticky { left: 4px; }
    th.th-pos { left: 4px; }
    td.col-name.sticky { left: 44px; }
    th.th-name { left: 44px; }
    td.col-pts.sticky { left: 174px; border-right: 2px solid #e8e8e8; }
    th.th-pts { left: 174px; border-right: 2px solid rgba(255,255,255,0.2); }

    /* Sombra sutil para indicar que hay scroll */
    td.col-pts.sticky, th.th-pts {
      box-shadow: 3px 0 6px rgba(0,0,0,0.08);
    }

    /* Las celdas sticky en filas top/bottom deben heredar el fondo blanco siempre
       (el color se indica con la barra lateral, no el fondo de fila) */
    tbody tr:hover td.sticky {
      background: #fafafa;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    td {
      padding: 12px 14px;
      text-align: center;
      white-space: nowrap;
      color: #1a1a1a;
    }

    td.col-pos {
      font-weight: 700;
      font-size: 13px;
      color: #888;
      width: 36px;
    }

    td.col-name {
      text-align: left;
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
      padding-left: 0;
    }

    td.col-pts {
      font-weight: 700;
      font-size: 15px;
      color: #1a1a1a;
      width: 52px;
    }

    td.col-j {
      font-size: 13px;
      color: #444;
      min-width: 38px;
    }

    td.np {
      color: #bbb;
      font-style: italic;
    }

    /* Línea de color según posición */
    td.col-bar {
      padding: 0;
      width: 4px;
    }

    tr.top-1 td.col-bar { background: #00cc44; }
    tr.top-2 td.col-bar { background: #00cc44; }
    tr.top-3 td.col-bar { background: #00cc44; }
    tr.top-4 td.col-bar { background: #00cc44; }
    tr.mid td.col-bar { background: transparent; }
    tr.bottom-1 td.col-bar { background: #e63312; }
    tr.bottom-2 td.col-bar { background: #e63312; }
    tr.bottom-3 td.col-bar { background: #e63312; }
    tr.bottom-4 td.col-bar { background: #e63312; }

    /* Badge de posición para top/bottom */
    tr.top-1 td.col-pts,
    tr.top-2 td.col-pts,
    tr.top-3 td.col-pts,
    tr.top-4 td.col-pts {
      color: #1a7a1a;
    }

    tr.bottom-1 td.col-pts,
    tr.bottom-2 td.col-pts,
    tr.bottom-3 td.col-pts,
    tr.bottom-4 td.col-pts {
      color: #cc2200;
    }

    /* Avatar del jugador */
    .player-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    /* Separador visual entre top y bottom */
    tr.separator td {
      border-top: 2px dashed #e0e0e0;
    }

    /* Columna puntos — resalte */
    th.col-pts-h {
      background: #4a0057;
    }

    @media (max-width: 600px) {
      body { padding: 16px 10px; }
      table { font-size: 12px; }
      td, thead th { padding: 9px 7px; }
      header h1 { font-size: 18px; }
      .avatar { width: 26px; height: 26px; font-size: 9px; }
      td.col-name.sticky { left: 38px; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
      th.th-name { left: 38px; }
      td.col-pts.sticky { left: 155px; }
      th.th-pts { left: 155px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/>
      </svg>
    </div>
    <div>
      <h1>Quiniela Güsak</h1>
      <p id="subtitulo">Cargando clasificación…</p>
    </div>
  </header>

  <div class="table-wrapper">
    <div class="scroll-container">
      <table id="tabla">
        <thead id="cabecera"></thead>
        <tbody id="cuerpo"></tbody>
      </table>
    </div>
  </div>

  <script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-IvFFGYOHR_OxkUBqUIReu9vSb3CJq5B31jH2vGU1zAQ68BqB1FIJRCPXpWMML41GLbxPxoPzKekP/pub?gid=1550608994&single=true&output=csv";

    const AVATAR_COLORS = [
      '#37003c','#00529f','#c8102e','#6c1d45','#1b458f',
      '#DA291C','#003090','#EF0107','#0057B8','#241F20',
      '#034694','#132257','#7A263A','#FDB913'
    ];

    function initials(name) {
      return name.trim().substring(0, 2).toUpperCase();
    }

    fetch(urlCSV)
      .then(r => r.text())
      .then(data => {
        const rows = data.trim().split("\n");
        const headers = rows[0].split(",");
        const bodyRows = rows.slice(1);

        const jugadores = bodyRows.map(fila => {
          const celdas = fila.split(",");
          return {
            nombre: celdas[0].trim(),
            puntos: parseInt(celdas[1]) || 0,
            jornadas: celdas.slice(2).map(v => v.trim())
          };
        });

        jugadores.sort((a, b) => b.puntos - a.puntos);

        const jornHeaders = headers.slice(2);
        const n = jugadores.length;

        // Subtítulo
        document.getElementById('subtitulo').textContent =
          `${n} jugadores · Jornada actual: ${jornHeaders[jornHeaders.length - 1] || '—'}`;

        // Cabecera
        const cab = document.getElementById('cabecera');
        cab.innerHTML = `<tr>
          <th class="sticky th-bar" style="width:4px;padding:0;"></th>
          <th class="col-left sticky th-pos" style="width:36px;">#</th>
          <th class="col-left sticky th-name">Jugador</th>
          <th class="col-pts-h sticky th-pts">Pts</th>
          ${jornHeaders.map(h => `<th>${h}</th>`).join('')}
        </tr>`;

        // Filas
        const tbody = document.getElementById('cuerpo');
        jugadores.forEach((j, i) => {
          const pos = i + 1;
          let clase = 'mid';
          if (i < 4) clase = `top-${i + 1}`;
          else if (i >= n - 4) clase = `bottom-${n - i}`;

          const sepClass = i === 4 ? ' separator' : '';
          const color = AVATAR_COLORS[i % AVATAR_COLORS.length];

          const jornadasHTML = j.jornadas.map(v => {
            const isNP = v.toUpperCase() === 'NP' || v === '' || v === '-';
            return `<td class="col-j${isNP ? ' np' : ''}">${v || '—'}</td>`;
          }).join('');

          tbody.innerHTML += `
            <tr class="${clase}${sepClass}">
              <td class="col-bar sticky"></td>
              <td class="col-pos sticky">${pos}</td>
              <td class="col-name sticky">
                <div class="player-cell">
                  <div class="avatar" style="background:${color}">${initials(j.nombre)}</div>
                  <span>${j.nombre}</span>
                </div>
              </td>
              <td class="col-pts sticky">${j.puntos}</td>
              ${jornadasHTML}
            </tr>
          `;
        });
      })
      .catch(() => {
        document.getElementById('subtitulo').textContent = 'Error al cargar los datos.';
      });
  </script>
</body>
</html>
